<!DOCTYPE html>
<html>
<head>
<title>Request Service</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: #8b5cf6; /* نفس اللون البنفسجي */
    min-height: 100vh;
}
</style>

</head>

<body>

<div class="container mt-5">

<h2 class="text-success">Request Service</h2>

<h4>{{ service.title }}</h4>
<p>{{ service.description }}</p>

<form method="POST">
{% csrf_token %}

<input type="text" name="phone" class="form-control mt-3" placeholder="Phone Number">

<textarea name="address" class="form-control mt-3" placeholder="Your Address"></textarea>

<button class="btn btn-success mt-3">
Confirm Request
</button>

</form>

</div>

</body>
</html>
