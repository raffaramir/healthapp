<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>HealthAI Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

/* ================= BACKGROUND ANIMATION ================= */
body {
    background: radial-gradient(circle at 20% 20%, #8b5cf6, transparent 40%),
                radial-gradient(circle at 80% 10%, #22c55e, transparent 35%),
                radial-gradient(circle at 50% 90%, #06b6d4, transparent 45%),
                #0f172a;
    overflow: hidden;
}

/* floating blur blobs */
.blob {
    position: absolute;
    width: 300px;
    height: 300px;
    filter: blur(80px);
    opacity: 0.6;
    animation: float 8s infinite ease-in-out;
}

@keyframes float {
    0%, 100% { transform: translateY(0px) }
    50% { transform: translateY(-30px) }
}

/* glass card */
.glass {
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.15);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

</style>

</head>

<body class="flex items-center justify-center h-screen text-white">

<!-- FLOATING BACKGROUND ELEMENTS -->
<div class="blob bg-purple-500 top-10 left-10"></div>
<div class="blob bg-green-400 bottom-10 right-10"></div>

<!-- LOGIN CARD -->
<div class="glass w-[380px] p-8 rounded-3xl z-10">

<!-- HEADER -->
<h2 class="text-3xl font-bold text-center">
    Welcome Back
</h2>

<p class="text-center text-gray-300 text-sm mt-2">
    Access your HealthAI dashboard
</p>

<!-- FORM -->
<form method="POST" class="mt-6">

{% csrf_token %}

<input type="text"
       name="username"
       placeholder="Username"
       class="w-full p-3 mt-3 rounded-xl bg-white/10 border border-white/20 outline-none text-white placeholder-gray-300">

<input type="password"
       name="password"
       placeholder="Password"
       class="w-full p-3 mt-3 rounded-xl bg-white/10 border border-white/20 outline-none text-white placeholder-gray-300">

<button class="w-full mt-5 p-3 rounded-xl font-bold text-white
               bg-gradient-to-r from-purple-500 to-cyan-500
               hover:scale-105 transition">
    Login
</button>

</form>

<!-- FOOTER -->
<p class="text-center text-xs text-gray-400 mt-6">
    AI Medical System • Secure Access
</p>

</div>

</body>
</html>
