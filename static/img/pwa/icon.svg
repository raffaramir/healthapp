<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="60%" stop-color="#16A34A"/>
      <stop offset="100%" stop-color="#0B5F2D"/>
    </linearGradient>
    <linearGradient id="cross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E6F9EE"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g filter="url(#glow)">
    <rect x="216" y="120" width="80" height="272" rx="20" fill="url(#cross)"/>
    <rect x="120" y="216" width="272" height="80" rx="20" fill="url(#cross)"/>
  </g>
  <circle cx="256" cy="256" r="22" fill="#16A34A" opacity=".55"/>
</svg>
