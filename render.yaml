# Render Blueprint — auto-detected by Render at the repo root.
# https://render.com/docs/blueprint-spec
# This is the canonical copy. The mirror at deploy/render/render.yaml is for docs only.

databases:
  - name: healthapp-db
    databaseName: healthapp
    user: healthapp
    plan: free          # 90 days free, then $7/mo

services:
  - type: web
    name: healthapp
    runtime: python
    plan: free          # sleeps after 15 min idle; ~50s cold start
    region: frankfurt   # change to oregon / ohio / singapore if you prefer
    branch: main
    buildCommand: "bash deploy/render/build.sh"
    startCommand: "daphne -b 0.0.0.0 -p $PORT healthapp.asgi:application"
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: "healthapp.onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://healthapp.onrender.com"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: healthapp-db
          property: connectionString
