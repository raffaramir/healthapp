{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#16A34A">
  <title>Offline — HEALTHAPP</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <style>
    .offline-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:radial-gradient(circle at 30% 20%, rgba(34,197,94,.15), transparent 50%),#060F0A;
      color:#e6f5ec;font-family:'Inter',system-ui,sans-serif;padding:2rem;}
    .offline-card{max-width:420px;text-align:center;background:rgba(8,20,14,.7);
      border:1px solid rgba(34,197,94,.25);border-radius:18px;padding:2.5rem;
      backdrop-filter:blur(14px);box-shadow:0 20px 50px rgba(0,0,0,.4);}
    .offline-icon{width:72px;height:72px;margin:0 auto 1.25rem;}
    h1{margin:0 0 .5rem;font-size:1.6rem;color:#22C55E;}
    p{opacity:.85;line-height:1.5;margin:0 0 1.5rem;}
    button{background:#16A34A;color:#fff;border:0;padding:.85rem 1.5rem;border-radius:10px;
      font-weight:600;cursor:pointer;font-size:1rem;}
    button:hover{background:#22C55E;}
  </style>
</head>
<body>
  <div class="offline-wrap">
    <div class="offline-card">
      <img class="offline-icon" src="{% static 'img/pwa/icon.svg' %}" alt="HEALTHAPP">
      <h1>You're offline</h1>
      <p>HEALTHAPP needs an internet connection to load this page. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </div>
</body>
</html>
