<div class="table-wrap">
  <table class="data-table">
    <thead><tr><th>#</th><th>Type</th><th>Title</th><th>Patient</th><th>Provider</th><th>Status</th><th>Created</th><th></th></tr></thead>
    <tbody>
      {% for r in requests %}
        <tr>
          <td>#{{ r.pk }}</td>
          <td>{{ r.get_service_type_display }}</td>
          <td>{{ r.title }}</td>
          <td>{{ r.patient.display_name }}</td>
          <td>{{ r.provider.display_name|default:'—' }}</td>
          <td><span class="badge" style="color:{{ r.status_color }};border-color:{{ r.status_color }}55;"><span class="dot"></span>{{ r.get_status_display }}</span></td>
          <td class="text-muted">{{ r.created_at|date:"M d, H:i" }}</td>
          <td><a class="btn btn-sm btn-secondary" href="{% url 'services:request_detail' r.pk %}">View</a></td>
        </tr>
      {% empty %}
        <tr><td colspan="8" class="empty"><div class="ico">📭</div>No requests.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
